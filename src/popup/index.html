<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorePlus</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <!-- Master Toggle -->
      <div class="toggle-bar">
        <div class="toggle-info">
          <span class="toggle-label">CorePlus</span>
          <span id="toggle-status" class="toggle-status">Aktif</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="master-toggle" />
          <span class="switch-track"></span>
        </label>
      </div>

      <!-- Content is rendered by popup.ts -->
      <main id="content"></main>

      <!-- Footer -->
      <footer class="footer">
        <p class="disclaimer">Tidak berafiliasi dengan DJP / Direktorat Jenderal Pajak.</p>
      </footer>
    </div>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
